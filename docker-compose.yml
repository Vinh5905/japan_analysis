name: ${INFRA_COMPOSE_PROJECT_NAME:-japan_analysis_infra}

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16.3-bookworm}
    container_name: ${INFRA_COMPOSE_PROJECT_NAME:-japan_analysis_infra}_postgres
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
      POSTGRES_DB: ${POSTGRES_DB:-suumo_crawler}
      POSTGRES_USER: ${POSTGRES_USER:-suumo_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-suumo_password_change_me}
      POSTGRES_INITDB_ARGS: ${POSTGRES_INITDB_ARGS:---encoding=UTF8 --locale=C}
      PGDATA: ${PGDATA:-/var/lib/postgresql/data/pgdata}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - shared_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\" -h 127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s

  minio:
    image: ${MINIO_IMAGE:-minio/minio:RELEASE.2024-07-16T23-46-41Z}
    container_name: ${INFRA_COMPOSE_PROJECT_NAME:-japan_analysis_infra}_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_change_me}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - shared_net
    healthcheck:
      test: ["CMD-SHELL", "mc ready local >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 15s

  minio-init:
    image: ${MINIO_MC_IMAGE:-minio/mc:RELEASE.2024-07-15T17-46-06Z}
    container_name: ${INFRA_COMPOSE_PROJECT_NAME:-japan_analysis_infra}_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/scripts/create-buckets.sh"]
    environment:
      MINIO_HOST: ${MINIO_HOST:-minio}
      MINIO_API_PORT: ${MINIO_API_PORT:-9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_change_me}
      MINIO_DEFAULT_BUCKETS: ${MINIO_DEFAULT_BUCKETS:-suumo}
    volumes:
      - ./docker/minio/create-buckets.sh:/scripts/create-buckets.sh:ro
    networks:
      - shared_net
    restart: "no"

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local

networks:
  shared_net:
    name: ${SHARED_NETWORK_NAME:-crawler_shared_net}
    driver: bridge
